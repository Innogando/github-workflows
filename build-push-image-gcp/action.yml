name: 'Build & Push Image to GCP'
description: 'Builds a Docker image and pushes it to GCP Artifact Registry'

inputs:
  image_name:
    description: Docker image name
    required: true
  repository:
    description: Artifact Registry repository name
    required: true
  tag:
    description: "Image tag. For prod: release tag. For dev: 'develop', 'dev', etc."
    required: true
  gcp_sa_key:
    description: GCP Service Account JSON key
    required: true
  also_tag_latest:
    description: Also push a :latest tag
    required: false
    default: 'false'
  checkout_ref:
    description: Git ref to checkout (tag, branch, SHA)
    required: false
    default: ''
  lfs:
    description: Enable Git LFS support during checkout
    required: false
    default: 'false'
  artifact_name:
    description: Name of a GitHub artifact to download before Docker build
    required: false
    default: ''
  artifact_path:
    description: Path where the downloaded artifact should be extracted
    required: false
    default: '.'
  gcp_project_id:
    description: GCP project ID
    required: false
    default: 'innogando'
  gcp_region:
    description: GCP region for Artifact Registry
    required: false
    default: 'europe-southwest1'
  build_args:
    description: "Docker build-args (multiline KEY=VALUE)"
    required: false
    default: ''
  context:
    description: "Docker build context (path to folder with Dockerfile)"
    required: false
    default: '.'

outputs:
  image:
    description: Full image reference (registry/project/repo/name:tag)
    value: ${{ steps.meta.outputs.image }}
  tag:
    description: Image tag used
    value: ${{ steps.meta.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.checkout_ref || github.sha }}
        lfs: ${{ inputs.lfs }}

    - name: Download pre-build artifact
      if: inputs.artifact_name != ''
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.artifact_path }}

    - name: Generate image metadata
      id: meta
      shell: bash
      run: |
        REGISTRY="${{ inputs.gcp_region }}-docker.pkg.dev"
        IMAGE="${REGISTRY}/${{ inputs.gcp_project_id }}/${{ inputs.repository }}/${{ inputs.image_name }}"
        TAG="${{ inputs.tag }}"
        echo "image=${IMAGE}:${TAG}" >> $GITHUB_OUTPUT
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
        echo "image-base=${IMAGE}" >> $GITHUB_OUTPUT

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ inputs.gcp_sa_key }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3

    - name: Configure Docker for Artifact Registry
      shell: bash
      run: gcloud auth configure-docker ${{ steps.meta.outputs.registry }} --quiet

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Compute Docker tags
      id: tags
      shell: bash
      run: |
        TAGS="${{ steps.meta.outputs.image }}"
        if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
          TAGS="${TAGS},${{ steps.meta.outputs.image-base }}:latest"
        fi
        echo "tags=${TAGS}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: ${{ inputs.build_args }}

    - name: Summary
      shell: bash
      run: |
        echo "### Image Published" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** \`${{ steps.meta.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
        if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
          echo "- **Latest:** \`${{ steps.meta.outputs.image-base }}:latest\`" >> $GITHUB_STEP_SUMMARY
        fi
