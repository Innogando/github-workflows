name: Flutter Web Build
description: Setup Flutter SDK, install dependencies, and build for web

inputs:
  flutter_version:
    description: Flutter SDK version
    required: true
  base_href:
    description: Base href for web build
    required: false
    default: "/"
  build_args:
    description: Extra arguments for flutter build web
    required: false
    default: ""
  token:
    description: If set, adds --dart-define=COWTROL_TOKEN=... (e.g. pass a repo secret; safe for special characters via env)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ inputs.flutter_version }}
        channel: stable
        cache: true

    - name: Install dependencies
      run: flutter pub get
      shell: bash

    - name: Build web
      env:
        TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        if [ -n "${TOKEN}" ]; then
          flutter build web --release --base-href "${{ inputs.base_href }}" \
            --dart-define=COWTROL_TOKEN="${TOKEN}" \
            ${{ inputs.build_args }}
        else
          flutter build web --release --base-href "${{ inputs.base_href }}" ${{ inputs.build_args }}
        fi
      shell: bash
