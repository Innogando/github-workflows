name: 'Flutter Test'
description: 'Runs Flutter tests with flutter pub get'

inputs:
  flutter_version:
    description: Flutter SDK version
    required: false
    default: '3.41.2'
  test_args:
    description: Arguments passed to flutter test
    required: false
    default: '--reporter expanded'
  run_build_runner:
    description: Whether to run build_runner before testing
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: ${{ inputs.flutter_version }}

    - name: Install dependencies
      run: flutter pub get
      shell: bash

    - name: Generate code
      if: ${{ inputs.run_build_runner == 'true' }}
      run: dart run build_runner build --delete-conflicting-outputs
      shell: bash

    - name: Run tests
      run: flutter test ${{ inputs.test_args }}
      shell: bash
