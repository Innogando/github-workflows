name: 'Release - CalVer'
description: 'Creates a CalVer tag and GitHub Release from a merged PR or push to main'

inputs:
  gh_pat:
    description: GitHub PAT for tag creation and release
    required: true

outputs:
  tag:
    description: The created CalVer tag (empty if release was skipped)
    value: ${{ steps.calver.outputs.tag }}

runs:
  using: 'composite'
  steps:
    # Skip logic (equivalent to the original job-level `if`):
    # - pull_request: only merged PRs without 'skip-release' label
    # - push: skip CD bot commits and explicit skip-release markers
    - name: Check release eligibility
      id: guard
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_MERGED: ${{ github.event.pull_request.merged }}
        PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        COMMIT_MSG: ${{ github.event.head_commit.message }}
      run: |
        SKIP=true
        if [ "$EVENT_NAME" = "pull_request" ]; then
          if [ "$PR_MERGED" = "true" ] && ! echo "$PR_LABELS" | grep -q '"skip-release"'; then
            SKIP=false
          fi
        elif [ "$EVENT_NAME" = "push" ]; then
          if ! echo "$COMMIT_MSG" | grep -q "Automated deployment of release" \
             && ! echo "$COMMIT_MSG" | grep -q "skip-release"; then
            SKIP=false
          fi
        fi
        echo "skip=${SKIP}" >> $GITHUB_OUTPUT
        if [ "$SKIP" = "true" ]; then
          echo "::notice::Release skipped (event=${EVENT_NAME})"
        fi

    - name: Checkout
      if: steps.guard.outputs.skip == 'false'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Fetch PR info
      id: pr-info
      if: steps.guard.outputs.skip == 'false'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.gh_pat }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        COMMIT_MSG: ${{ github.event.head_commit.message }}
        COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        COMMIT_BEFORE: ${{ github.event.before }}
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "title=${PR_TITLE}" >> $GITHUB_OUTPUT
          echo "author=${PR_AUTHOR}" >> $GITHUB_OUTPUT
          echo "url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "base_sha=${PR_BASE_SHA}" >> $GITHUB_OUTPUT
          echo "head_sha=${PR_HEAD_SHA}" >> $GITHUB_OUTPUT
        else
          PR_DATA=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0] | {number: .number, title: .title, author: .user.login, url: .html_url}' \
            2>/dev/null || echo '{}')
          echo "number=$(echo "$PR_DATA" | jq -r '.number // "N/A"')" >> $GITHUB_OUTPUT
          echo "title=$(echo "$PR_DATA" | jq -r --arg d "${COMMIT_MSG}" '.title // $d')" >> $GITHUB_OUTPUT
          echo "author=$(echo "$PR_DATA" | jq -r --arg d "${COMMIT_AUTHOR}" '.author // $d')" >> $GITHUB_OUTPUT
          echo "url=$(echo "$PR_DATA" | jq -r '.url // ""')" >> $GITHUB_OUTPUT
          echo "base_sha=${COMMIT_BEFORE}" >> $GITHUB_OUTPUT
          echo "head_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi

    - name: Create CalVer tag
      id: calver
      if: steps.guard.outputs.skip == 'false'
      uses: Digital-Udvikling/actions-calver@v0.5.0
      with:
        github_token: ${{ inputs.gh_pat }}

    - name: Generate release notes
      if: steps.guard.outputs.skip == 'false'
      shell: bash
      run: |
        VERSION="${{ steps.calver.outputs.tag }}"
        cat > release-notes.md << EOF
        ## Changes in ${VERSION}

        ### Pull Request
        - **PR #${{ steps.pr-info.outputs.number }}**: ${{ steps.pr-info.outputs.title }}
        - **Author**: @${{ steps.pr-info.outputs.author }}
        - **Link**: ${{ steps.pr-info.outputs.url }}

        ### Commits
        EOF
        git log --oneline \
          ${{ steps.pr-info.outputs.base_sha }}..${{ steps.pr-info.outputs.head_sha }} \
          >> release-notes.md

    - name: Create GitHub Release
      if: steps.guard.outputs.skip == 'false'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.gh_pat }}
      run: |
        gh release create "${{ steps.calver.outputs.tag }}" \
          --title "Release ${{ steps.calver.outputs.tag }}" \
          --notes-file release-notes.md \
          --verify-tag

    - name: Comment on PR
      if: steps.guard.outputs.skip == 'false' && steps.pr-info.outputs.number != 'N/A' && steps.pr-info.outputs.number != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.gh_pat }}
      run: |
        VERSION="${{ steps.calver.outputs.tag }}"
        gh pr comment ${{ steps.pr-info.outputs.number }} --body "Release **${VERSION}** created (CalVer). CD will deploy automatically.

        - Tag: \`${VERSION}\`
        - [View Release](https://github.com/${{ github.repository }}/releases/tag/${VERSION})

        Add label \`skip-release\` (PR trigger) or \`skip-release\` in commit message (push trigger) to skip future releases."
