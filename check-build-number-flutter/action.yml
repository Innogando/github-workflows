name: 'Check Build Number Flutter'

description: 'Check that the Flutter build number in pubspec.yaml is greater than the PR base branch'

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Check build number
      run: |
        set -euo pipefail

        BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"

        # Get current build number
        CURRENT_BUILD_NUMBER=$(grep "version:" pubspec.yaml | sed 's/.*+//')
        echo "Current build number: $CURRENT_BUILD_NUMBER"

        # Get build number from the PR base branch (e.g. develop or main)
        git fetch origin "${BASE_REF}"
        BASE_BUILD_NUMBER=$(git show "origin/${BASE_REF}:pubspec.yaml" | grep "version:" | sed 's/.*+//')
        echo "Build number on ${BASE_REF}: $BASE_BUILD_NUMBER"

        # Verify: must be strictly greater than base (allows skipping ahead after multiple merges)
        if [ "$CURRENT_BUILD_NUMBER" -gt "$BASE_BUILD_NUMBER" ]; then
          echo "✅ The build number has been incremented correctly"
        else
          echo "❌ The build number validation has failed!"
          echo "Current: $CURRENT_BUILD_NUMBER, must be greater than ${BASE_REF}: $BASE_BUILD_NUMBER"
          echo "Please increment the build number in pubspec.yaml above ${BASE_BUILD_NUMBER}"
          exit 1
        fi
      shell: bash